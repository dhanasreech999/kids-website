<!DOCTYPE html>
<html>
<head>
<title>Learn Numbers</title>

<style>

body{
background:#e3f2fd;
font-family:Comic Sans MS;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
display:grid;
grid-template-columns:repeat(5,120px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.card{
width:120px;
height:120px;
background:white;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.card:hover{
background:#ffd54f;
transform:scale(1.1);
}

button{
margin-top:30px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🔢 Learn Numbers</h1>

<div class="container" id="numbers"></div>

<a href="index.html">
<button>⬅ Back to Home</button>
</a>

<script>

let max = 100;

for(let i=1;i<=max;i++){

let card=document.createElement("div");
card.className="card";
card.innerText=i;

card.onclick=function(){

let speech=new SpeechSynthesisUtterance(i);
speechSynthesis.speak(speech);

}

document.getElementById("numbers").appendChild(card);

}

</script>

</body>
</html>
